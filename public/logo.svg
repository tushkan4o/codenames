<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 72 72" width="64" height="64">
  <defs>
    <clipPath id="r">
      <rect x="-1" y="-1" width="66" height="66" rx="8" ry="8"/>
    </clipPath>
  </defs>
  <g clip-path="url(#r)">
    <!-- Red upper-left triangle -->
    <path d="M0,0 L64,0 L0,64 Z" fill="#EF5350" transform="translate(-1,-1)"/>
    <!-- Blue lower-right triangle -->
    <path d="M64,0 L64,64 L0,64 Z" fill="#42A5F5" transform="translate(1,1)"/>
  </g>
  <!-- Diagonal line outside clip, extending 5% beyond edges -->
  <line x1="-3.2" y1="67.2" x2="67.2" y2="-3.2" stroke="#121218" stroke-width="4" stroke-linecap="round"/>
</svg>
